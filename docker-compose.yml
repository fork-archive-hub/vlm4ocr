version: '3.8'

services:
  web_app:
    build:
      context: .
      dockerfile: services/web_app/Dockerfile
    container_name: vlm4ocr_web_app
    restart: always
    environment: []
    expose:
      - "5000"
    volumes:
      - ./services/web_app:/app/services/web_app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:latest
    container_name: vlm4ocr_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web_app